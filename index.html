<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Produtos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="topbar">
        <div class="container topbar-container">

            <a class="logo" href="#">📦 Catálogo</a>

            <div class="topbar-actions">
                <input 
                    type="search" 
                    id="input-busca" 
                    class="search-input" 
                    placeholder="Buscar produto..."
                >

                <button class="btn-header btn-favoritos" id="btn-favoritos">
                    ⭐ Favoritos
                </button>

                <button 
                    class="btn-header btn-carrinho" 
                    type="button" 
                    data-bs-toggle="offcanvas" 
                    data-bs-target="#gavetaCarrinho"
                >
                    🛒 Carrinho
                </button>
            </div>

        </div>
    </header>

    <main class="container">
        <!-- Filtros -->
        <div class="row mb-4 mt-3">
            <div class="col-md-6">
                <select class="form-select border-warning" id="select-categoria">
                    <option value="todas">Todas as Categorias</option>
                    <option value="laptops">Notebooks</option>
                    <option value="smartphones">Smartphones</option>
                    <option value="tablets">Tablets</option>
                    <option value="mobile-accessories">Acessórios Mobile</option>
                </select>
            </div>

            <div class="filter-item">
                <select id="select-ordenacao" class="form-select select-filter">
                    <option value="padrao">Ordenar por: Relevância (Padrão)</option>
                    <option value="menor-preco">Menor Preço</option>
                    <option value="maior-preco">Maior Preço</option>
                </select>
            </div>
        </section>

        <section class="row g-4 products-grid" id="lista-produtos"></section>

    </main>

    <div class="modal fade" id="modalProduto" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content modal-product">

                <div class="modal-header modal-product-header">
                    <h5 class="modal-title" id="modalTitulo">Nome</h5>

                    <button 
                        type="button" 
                        class="btn-close btn-close-white" 
                        data-bs-dismiss="modal" 
                        aria-label="Close"
                    ></button>
                </div>

                <div class="modal-body modal-product-body">
                    <img id="modalImagem" src="" alt="Produto" class="modal-product-image">

                    <p id="modalDescricao" class="modal-description"></p>

                    <div class="modal-info">
                        <span class="brand-badge" id="modalMarca">Marca</span>
                        <span class="rating" id="modalAvaliacao">⭐ 0.0</span>
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn-close-modal" data-bs-dismiss="modal">
                        Fechar
                    </button>
                </div>

            </div>
        </div>
    </div>

    <div 
        class="offcanvas offcanvas-end" 
        tabindex="-1" 
        id="gavetaCarrinho" 
        aria-labelledby="gavetaCarrinhoLabel"
    >
        <div class="offcanvas-header cart-header">
            <h5 class="offcanvas-title" id="gavetaCarrinhoLabel">🛒 Meu Carrinho</h5>

            <button 
                type="button" 
                class="btn-close btn-close-white" 
                data-bs-dismiss="offcanvas" 
                aria-label="Close"
            ></button>
        </div>

        <div class="offcanvas-body cart-body">
            <div id="itens-carrinho" class="cart-items">
                <p class="empty-cart">Seu carrinho está vazio.</p>
            </div>

            <div class="cart-footer">
                <div class="cart-total">
                    <h5>Total:</h5>
                    <h4 id="total-carrinho">R$ 0,00</h4>
                </div>

                <button class="btn-finalizar">
                    Finalizar Compra
                </button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
