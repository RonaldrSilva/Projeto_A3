<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Produtos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="#">📦 Catálogo</a>
            <div class="d-flex">
                <input class="form-control me-2" type="search" placeholder="Buscar produto..." id="input-busca">
                <button class="btn btn-outline-warning" id="btn-favoritos">⭐ Favoritos</button>
                <button class="btn btn-outline-success ms-2" type="button" data-bs-toggle="offcanvas" data-bs-target="#gavetaCarrinho">
                    🛒 Carrinho
                </button>
            </div>
        </div>
    </nav>

    <main class="container">
        <!-- Filtros -->
        <div class="row mb-4 mt-3">
            <div class="col-md-6">
                <select class="form-select border-warning" id="select-categoria">
                    <option value="todas">Todas as Categorias</option>
                    <option value="laptops">Notebooks</option>
                    <option value="smartphones">Smartphones</option>
                    <option value="tablets">Tablets</option>
                    <option value="mobile-accessories">Acessórios Mobile</option>
                </select>
            </div>
            <div class="col-md-6">
                <select class="form-select border-warning" id="select-ordenacao">
                    <option value="padrao">Ordenar por: Relevância (Padrão)</option>
                    <option value="menor-preco">Menor Preço</option>
                    <option value="maior-preco">Maior Preço</option>
                </select>
            </div>
        </div>

        <div class="row g-4" id="lista-produtos">
            
        </div>
    </main>

    <div class="modal fade" id="modalProduto" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header bg-dark text-white">
                    <h5 class="modal-title" id="modalTitulo">Nome</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body text-center">
                    <img id="modalImagem" src="" alt="Produto" class="img-fluid mb-3" style="max-height: 250px; object-fit: contain;">
                    <p id="modalDescricao" class="text-muted"></p>
                    <hr>
                    <div class="d-flex justify-content-between px-3">
                        <span class="badge bg-secondary fs-6" id="modalMarca">Marca</span>
                        <span class="text-warning fw-bold fs-5" id="modalAvaliacao">⭐ 0.0</span>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-outline-dark" data-bs-dismiss="modal">Fechar</button>
                </div>
            </div>
        </div>
    </div>

    <div class="offcanvas offcanvas-end" tabindex="-1" id="gavetaCarrinho" aria-labelledby="gavetaCarrinhoLabel">
        <div class="offcanvas-header bg-success text-white">
            <h5 class="offcanvas-title" id="gavetaCarrinhoLabel">🛒 Meu Carrinho</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas" aria-label="Close"></button>
        </div>
        <div class="offcanvas-body d-flex flex-column">
            <div id="itens-carrinho" class="flex-grow-1 overflow-auto">
                <p class="text-muted text-center mt-5">Seu carrinho está vazio.</p>
            </div>
            
            <div class="border-top pt-3 mt-3">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h5 class="mb-0">Total:</h5>
                    <h4 class="text-success fw-bold mb-0" id="total-carrinho">R$ 0.00</h4>
                </div>
                <button class="btn btn-success w-100 fw-bold">Finalizar Compra</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/api.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
