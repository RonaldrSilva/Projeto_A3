<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo de Produtos</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header class="topbar">
        <div class="container topbar-container">

            <a class="logo" href="#">📦 Catálogo</a>

            <div class="topbar-actions">
                <input 
                    type="search" 
                    id="input-busca" 
                    class="search-input" 
                    placeholder="Buscar produto, marca ou categoria..."
                >

                <button 
                    class="btn-header btn-tema" 
                    id="btn-tema" 
                    type="button"
                    title="Alternar tema"
                    aria-label="Alternar tema"
                >
                    🌙
                </button>

                <button class="btn-header btn-favoritos" id="btn-favoritos" type="button">
                    ⭐ Favoritos
                </button>

                <button 
                    class="btn-header btn-carrinho position-relative" 
                    type="button" 
                    data-bs-toggle="offcanvas" 
                    data-bs-target="#gavetaCarrinho"
                >
                    🛒 Carrinho
                    <span id="contador-carrinho" class="cart-badge d-none">0</span>
                </button>
            </div>

        </div>
    </header>

    <main class="container">

        <section class="filters">
            <div class="filter-item">
                <select id="select-categoria" class="form-select select-filter">
                    <option value="todas">Todas as Categorias</option>
                    <option value="laptops">Notebooks</option>
                    <option value="smartphones">Smartphones</option>
                    <option value="tablets">Tablets</option>
                    <option value="mobile-accessories">Acessórios Mobile</option>
                </select>
            </div>

            <div class="filter-item">
                <select id="select-ordenacao" class="form-select select-filter">
                    <option value="padrao">Ordenar por: Relevância (Padrão)</option>
                    <option value="menor-preco">Menor Preço</option>
                    <option value="maior-preco">Maior Preço</option>
                </select>
            </div>
        </section>

        <section class="row g-4 products-grid" id="lista-produtos"></section>

    </main>

    <!-- Modal de detalhes do produto -->
    <div class="modal fade" id="modalProduto" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content modal-product">

                <div class="modal-header modal-product-header">
                    <h5 class="modal-title" id="modalTitulo">Nome</h5>

                    <button 
                        type="button" 
                        class="btn-close btn-close-white" 
                        data-bs-dismiss="modal" 
                        aria-label="Fechar"
                    ></button>
                </div>

                <div class="modal-body modal-product-body">
                    <div class="modal-image-area">
                        <button id="btn-imagem-anterior" class="btn-modal-image" type="button" aria-label="Imagem anterior">
                            ‹
                        </button>

                        <img id="modalImagem" src="" alt="Produto" class="modal-product-image">

                        <button id="btn-proxima-imagem" class="btn-modal-image" type="button" aria-label="Próxima imagem">
                            ›
                        </button>
                    </div>

                    <small id="contador-imagens" class="image-counter"></small>

                    <p id="modalDescricao" class="modal-description"></p>

                    <div class="modal-info">
                        <span class="brand-badge" id="modalMarca">Marca</span>
                        <span class="rating" id="modalAvaliacao">⭐ 0.0</span>
                    </div>
                </div>

                <div class="modal-footer">
                    <button type="button" class="btn-close-modal" data-bs-dismiss="modal">
                        Fechar
                    </button>
                </div>

            </div>
        </div>
    </div>

    <!-- Gaveta do carrinho -->
    <div 
        class="offcanvas offcanvas-end" 
        tabindex="-1" 
        id="gavetaCarrinho" 
        aria-labelledby="gavetaCarrinhoLabel"
    >
        <div class="offcanvas-header cart-header">
            <h5 class="offcanvas-title" id="gavetaCarrinhoLabel">🛒 Meu Carrinho</h5>

            <button 
                type="button" 
                class="btn-close btn-close-white" 
                data-bs-dismiss="offcanvas" 
                aria-label="Fechar"
            ></button>
        </div>

        <div class="offcanvas-body cart-body">
            <div id="itens-carrinho" class="cart-items">
                <p class="empty-cart">Seu carrinho está vazio.</p>
            </div>

            <div class="cart-footer">
                <div class="cart-total">
                    <h5>Total:</h5>
                    <h4 id="total-carrinho">R$ 0,00</h4>
                </div>

                <button class="btn-finalizar" type="button">
                    Finalizar Compra
                </button>
            </div>
        </div>
    </div>

    <!-- Toast de notificação -->
    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div 
            id="toast-notificacao" 
            class="toast toast-custom" 
            role="alert" 
            aria-live="assertive" 
            aria-atomic="true"
        >
            <div class="toast-header toast-custom-header">
                <strong class="me-auto" id="toast-titulo">Notificação</strong>
                <button 
                    type="button" 
                    class="btn-close" 
                    data-bs-dismiss="toast" 
                    aria-label="Fechar"
                ></button>
            </div>

            <div class="toast-body" id="toast-mensagem"></div>
        </div>
    </div>

<!-- BOOTSTRAP -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- API -->
<script src="js/api.js"></script>

<!-- STORAGE -->
<script src="js/storage.js"></script>

<!-- UTILS -->
<script src="js/utils/formatters.js"></script>
<script src="js/utils/helpers.js"></script>
<script src="js/utils/ratings.js"></script>

<!-- UI -->
<script src="js/ui/toast.js"></script>
<script src="js/ui/skeleton.js"></script>
<script src="js/ui/cards.js"></script>
<script src="js/ui/carrinho.js"></script>
<script src="js/ui/modal.js"></script>

<!-- STATE -->
<script src="js/state/theme.js"></script>

<!-- APP -->
<script src="js/app.js"></script>
</body>
</html>
